name: Correccion ejercicios

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  corregir:
    name: Corregir TP
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ejecutar corrector
        run: python tests/corrector.py
